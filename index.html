<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FNAF — Пять ночей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        .game-container {
            width: 100%;
            max-width: 900px;
            height: 100vh;
            max-height: 700px;
            background: radial-gradient(ellipse at center, #1a1a2e, #0a0a0a);
            border-radius: 30px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 80px rgba(80, 0, 0, 0.3);
            border: 1px solid rgba(255, 50, 50, 0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            border-bottom: 2px solid #2a0a0a;
            font-size: 14px;
            color: #aa8888;
        }
        .header .night {
            color: #ff5555;
            font-weight: 700;
            font-size: 18px;
            text-shadow: 0 0 20px rgba(255,0,0,0.2);
        }
        .header .power {
            color: #ffaa00;
        }
        .header .power span {
            font-weight: 700;
        }
        .main-area {
            flex: 1;
            display: flex;
            gap: 16px;
            margin: 12px 0;
            min-height: 0;
        }
        /* ОФИС (основное поле) */
        .office {
            flex: 2;
            background: radial-gradient(ellipse at 50% 80%, #1a1a1a, #050505);
            border-radius: 24px;
            border: 1px solid rgba(255,50,50,0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .office .desk {
            width: 80%;
            height: 30%;
            background: linear-gradient(0deg, #1a0a0a, transparent);
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50% 50% 0 0 / 30% 30% 0 0;
            border-top: 2px solid rgba(255,50,50,0.1);
        }
        .office .screen-flicker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.4));
            pointer-events: none;
            animation: flicker 3s infinite;
        }
        @keyframes flicker {
            0%, 95% { opacity: 0; }
            96% { opacity: 0.3; }
            100% { opacity: 0; }
        }
        .office .status-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255,100,100,0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        /* КАМЕРЫ (справа) */
        .cameras {
            flex: 1;
            background: rgba(0,0,0,0.6);
            border-radius: 24px;
            border: 1px solid rgba(255,50,50,0.05);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 150px;
        }
        .cameras .cam-title {
            font-size: 12px;
            color: #aa5555;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,50,50,0.05);
            padding-bottom: 6px;
        }
        .camera-btn {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,50,50,0.05);
            border-radius: 14px;
            padding: 10px 8px;
            color: #886666;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .camera-btn:hover {
            background: rgba(255,50,50,0.05);
            border-color: rgba(255,50,50,0.15);
        }
        .camera-btn .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #44aa44;
            box-shadow: 0 0 10px #44aa44;
            transition: 0.3s;
        }
        .camera-btn .dot.danger {
            background: #ff4444;
            box-shadow: 0 0 15px #ff4444;
        }
        .camera-btn .cam-name {
            font-weight: 500;
        }
        .camera-btn .cam-status {
            font-size: 11px;
            color: #665555;
        }
        /* ДВЕРИ (кнопки внизу) */
        .doors {
            display: flex;
            gap: 12px;
            justify-content: center;
            padding: 8px 0;
        }
        .door-btn {
            padding: 10px 28px;
            border-radius: 40px;
            border: 1px solid rgba(255,50,50,0.1);
            background: rgba(0,0,0,0.3);
            color: #886666;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            flex: 1;
            max-width: 150px;
        }
        .door-btn:hover {
            background: rgba(255,50,50,0.05);
            border-color: rgba(255,50,50,0.2);
        }
        .door-btn.active {
            background: rgba(255,50,50,0.1);
            border-color: #ff4444;
            color: #ff4444;
            box-shadow: 0 0 30px rgba(255,0,0,0.1);
        }
        .door-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            z-index: 10;
        }
        .game-over.show {
            display: flex;
        }
        .game-over h1 {
            font-size: 48px;
            color: #ff2222;
            text-shadow: 0 0 60px rgba(255,0,0,0.3);
            margin-bottom: 8px;
        }
        .game-over p {
            font-size: 18px;
            color: #886666;
            margin-bottom: 20px;
        }
        .game-over button {
            padding: 14px 48px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }
        .game-over button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(124,58,237,0.3);
        }
        .win {
            color: #44dd44 !important;
            text-shadow: 0 0 60px rgba(0,255,0,0.2) !important;
        }
        @media (max-width: 700px) {
            .main-area { flex-direction: column; }
            .cameras { flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .cameras .cam-title { width: 100%; }
            .camera-btn { flex: 1; min-width: 80px; }
            .door-btn { max-width: 100px; }
        }
    </style>
</head>
<body>

    <div class="game-container" id="app">
        <!-- ШАПКА -->
        <div class="header">
            <div class="night">🌙 Ночь <span id="nightNum">1</span></div>
            <div class="power">⚡ Энергия: <span id="powerNum">100</span>%</div>
        </div>

        <!-- ОСНОВНАЯ ОБЛАСТЬ -->
        <div class="main-area">
            <!-- ОФИС -->
            <div class="office" id="office">
                <div class="desk"></div>
                <div class="screen-flicker"></div>
                <div class="status-text" id="statusText">🔴 ВСЁ СПОКОЙНО</div>
                <div id="animatronicDisplay" style="position:absolute; top:20%; font-size:60px; opacity:0.7; pointer-events:none; text-shadow: 0 0 40px rgba(255,0,0,0.2);"></div>
            </div>

            <!-- КАМЕРЫ -->
            <div class="cameras">
                <div class="cam-title">📹 КАМЕРЫ</div>
                <button class="camera-btn" data-cam="cam1">
                    <span class="cam-name">📹 Зал</span>
                    <span class="cam-status" id="cam1Status">Пусто</span>
                    <span class="dot" id="cam1Dot"></span>
                </button>
                <button class="camera-btn" data-cam="cam2">
                    <span class="cam-name">📹 Коридор</span>
                    <span class="cam-status" id="cam2Status">Пусто</span>
                    <span class="dot" id="cam2Dot"></span>
                </button>
                <button class="camera-btn" data-cam="cam3">
                    <span class="cam-name">📹 Склад</span>
                    <span class="cam-status" id="cam3Status">Пусто</span>
                    <span class="dot" id="cam3Dot"></span>
                </button>
            </div>
        </div>

        <!-- ДВЕРИ -->
        <div class="doors">
            <button class="door-btn" id="leftDoor">🚪 Левая дверь</button>
            <button class="door-btn" id="rightDoor">🚪 Правая дверь</button>
        </div>

        <!-- ЭКРАН ПОРАЖЕНИЯ -->
        <div class="game-over" id="gameOver">
            <h1 id="resultTitle">💀 ВАС НАШЛИ</h1>
            <p id="resultDesc">Вы продержались 0 ночей</p>
            <button id="restartBtn">🔄 Начать заново</button>
        </div>
    </div>

    <script>
        // ============================================================
        // FNAF — ИГРОВАЯ ЛОГИКА
        // ============================================================
        const state = {
            night: 1,
            power: 100,
            leftDoor: false,
            rightDoor: false,
            animatronics: {
                freddy: { name: 'Фредди', pos: 'cam1', danger: false, speed: 0.3 },
                bonnie: { name: 'Бонни', pos: 'cam2', danger: false, speed: 0.4 },
                chica: { name: 'Чика', pos: 'cam3', danger: false, speed: 0.35 }
            },
            gameOver: false,
            win: false,
            interval: null,
            powerInterval: null,
            moveInterval: null,
            nightTimer: 0,
            maxNightTime: 60 // секунд на ночь
        };

        // DOM элементы
        const nightNum = document.getElementById('nightNum');
        const powerNum = document.getElementById('powerNum');
        const statusText = document.getElementById('statusText');
        const leftDoorBtn = document.getElementById('leftDoor');
        const rightDoorBtn = document.getElementById('rightDoor');
        const gameOverEl = document.getElementById('gameOver');
        const resultTitle = document.getElementById('resultTitle');
        const resultDesc = document.getElementById('resultDesc');
        const restartBtn = document.getElementById('restartBtn');
        const animatronicDisplay = document.getElementById('animatronicDisplay');

        // Обновление UI камер
        function updateCameras() {
            const anims = state.animatronics;
            const camStatus = { cam1: [], cam2: [], cam3: [] };
            for (let key in anims) {
                const a = anims[key];
                if (a.pos) camStatus[a.pos].push(a.name);
            }
            ['cam1', 'cam2', 'cam3'].forEach((cam, idx) => {
                const statusEl = document.getElementById(cam + 'Status');
                const dotEl = document.getElementById(cam + 'Dot');
                const names = camStatus[cam];
                if (names.length > 0) {
                    statusEl.textContent = names.join(', ');
                    dotEl.className = 'dot danger';
                } else {
                    statusEl.textContent = 'Пусто';
                    dotEl.className = 'dot';
                }
            });
        }

        // Проверка безопасности
        function checkSafety() {
            const anims = state.animatronics;
            let danger = false;
            let dangerMsg = '🔴 ВСЁ СПОКОЙНО';
            for (let key in anims) {
                const a = anims[key];
                if (a.pos === 'office') {
                    danger = true;
                    dangerMsg = `⚠️ ${a.name} В ОФИСЕ!`;
                    break;
                }
            }
            statusText.textContent = dangerMsg;
            if (danger) {
                gameOver('💀 ВАС НАШЛИ', `Вас нашёл ${Object.values(anims).find(a => a.pos === 'office').name}`);
            }
            return !danger;
        }

        // Передвижение аниматроников
        function moveAnimatronics() {
            if (state.gameOver) return;
            const anims = state.animatronics;
            const rooms = ['cam1', 'cam2', 'cam3', 'office'];
            for (let key in anims) {
                const a = anims[key];
                if (Math.random() < a.speed * 0.1) {
                    let newPos;
                    do {
                        newPos = rooms[Math.floor(Math.random() * rooms.length)];
                    } while (newPos === a.pos && Math.random() > 0.3);
                    a.pos = newPos;
                }
            }
            updateCameras();
            checkSafety();
            // Обновление отображения аниматроника в офисе
            const officeAnim = Object.values(anims).find(a => a.pos === 'office');
            if (officeAnim) {
                animatronicDisplay.textContent = '👾';
            } else {
                animatronicDisplay.textContent = '';
            }
        }

        // Игра окончена
        function gameOver(title, desc) {
            if (state.gameOver) return;
            state.gameOver = true;
            clearInterval(state.interval);
            clearInterval(state.powerInterval);
            clearInterval(state.moveInterval);
            resultTitle.textContent = title;
            resultDesc.textContent = desc || 'Вы продержались ' + state.night + ' ночей';
            gameOverEl.classList.add('show');
        }

        // Победа (ночь пройдена)
        function winNight() {
            if (state.gameOver) return;
            state.night++;
            if (state.night > 5) {
                // Полная победа
                state.gameOver = true;
                clearInterval(state.interval);
                clearInterval(state.powerInterval);
                clearInterval(state.moveInterval);
                resultTitle.textContent = '🏆 ВЫ ВЫЖИЛИ!';
                resultTitle.className = 'win';
                resultDesc.textContent = 'Вы прошли все 5 ночей!';
                gameOverEl.classList.add('show');
                return;
            }
            nightNum.textContent = state.night;
            state.nightTimer = 0;
            state.power = 100;
            powerNum.textContent = state.power;
            statusText.textContent = '🌙 Ночь ' + state.night + ' началась';
            // Сброс позиций аниматроников
            const rooms = ['cam1', 'cam2', 'cam3'];
            for (let key in state.animatronics) {
                state.animatronics[key].pos = rooms[Math.floor(Math.random() * rooms.length)];
            }
            updateCameras();
        }

        // Энергия
        function consumePower() {
            if (state.gameOver) return;
            let drain = 1;
            if (state.leftDoor) drain += 2;
            if (state.rightDoor) drain += 2;
            state.power = Math.max(0, state.power - drain * 0.5);
            powerNum.textContent = Math.floor(state.power);
            if (state.power <= 0) {
                gameOver('⚡ НЕТ ЭНЕРГИИ', 'Вы не смогли продержаться до утра');
            }
        }

        // Таймер ночи
        function nightTimerTick() {
            if (state.gameOver) return;
            state.nightTimer++;
            if (state.nightTimer >= state.maxNightTime) {
                winNight();
            }
        }

        // Перезапуск
        function restartGame() {
            state.night = 1;
            state.power = 100;
            state.leftDoor = false;
            state.rightDoor = false;
            state.gameOver = false;
            state.nightTimer = 0;
            state.maxNightTime = 60;
            gameOverEl.classList.remove('show');
            gameOverEl.querySelector('h1').className = '';
            nightNum.textContent = '1';
            powerNum.textContent = '100';
            statusText.textContent = '🔴 ВСЁ СПОКОЙНО';
            leftDoorBtn.classList.remove('active');
            rightDoorBtn.classList.remove('active');
            const rooms = ['cam1', 'cam2', 'cam3'];
            for (let key in state.animatronics) {
                state.animatronics[key].pos = rooms[Math.floor(Math.random() * rooms.length)];
            }
            updateCameras();
            animatronicDisplay.textContent = '';
            clearInterval(state.interval);
            clearInterval(state.powerInterval);
            clearInterval(state.moveInterval);
            startGame();
        }

        // Старт игры
        function startGame() {
            state.interval = setInterval(nightTimerTick, 1000);
            state.powerInterval = setInterval(consumePower, 1000);
            state.moveInterval = setInterval(moveAnimatronics, 3000);
            updateCameras();
        }

        // Управление дверями
        leftDoorBtn.addEventListener('click', function() {
            if (state.gameOver) return;
            state.leftDoor = !state.leftDoor;
            this.classList.toggle('active');
            statusText.textContent = state.leftDoor ? '🚪 Левая дверь закрыта' : '🔴 ВСЁ СПОКОЙНО';
        });
        rightDoorBtn.addEventListener('click', function() {
            if (state.gameOver) return;
            state.rightDoor = !state.rightDoor;
            this.classList.toggle('active');
            statusText.textContent = state.rightDoor ? '🚪 Правая дверь закрыта' : '🔴 ВСЁ СПОКОЙНО';
        });

        // Перезапуск
        restartBtn.addEventListener('click', restartGame);

        // СТАРТ
        startGame();
    </script>
</body>
</html>
