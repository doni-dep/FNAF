<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FNAF — Пять ночей с Фредди</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body {
            font-family: 'Press Start 2P', 'Segoe UI', monospace;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        .game-container {
            width: 100%;
            max-width: 1100px;
            height: 100vh;
            max-height: 800px;
            background: radial-gradient(ellipse at center, #1a1a2e, #0a0a0a);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 100px rgba(80, 0, 0, 0.3);
            border: 2px solid rgba(255, 50, 50, 0.05);
        }
        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            border-bottom: 3px solid #2a0a0a;
            font-size: 14px;
            color: #aa8888;
        }
        .header .night {
            color: #ff5555;
            font-weight: 700;
            font-size: 18px;
            text-shadow: 0 0 20px rgba(255,0,0,0.2);
        }
        .header .power {
            color: #ffaa00;
        }
        .header .power span {
            font-weight: 700;
        }
        .header .time {
            color: #6688aa;
            font-size: 12px;
        }
        /* ===== ОСНОВНАЯ ОБЛАСТЬ ===== */
        .main-area {
            flex: 1;
            display: flex;
            gap: 16px;
            margin: 12px 0;
            min-height: 0;
        }
        /* ===== ОФИС ===== */
        .office {
            flex: 2;
            background: radial-gradient(ellipse at 50% 80%, #1a1a1a, #050505);
            border-radius: 20px;
            border: 1px solid rgba(255,50,50,0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .office .desk {
            width: 80%;
            height: 35%;
            background: linear-gradient(0deg, #1a0a0a, transparent);
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50% 50% 0 0 / 30% 30% 0 0;
            border-top: 3px solid rgba(255,50,50,0.05);
        }
        .office .screen-flicker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.5));
            pointer-events: none;
            animation: flicker 2.5s infinite;
        }
        @keyframes flicker {
            0%, 90% { opacity: 0; }
            91% { opacity: 0.4; }
            92% { opacity: 0; }
            93% { opacity: 0.3; }
            94% { opacity: 0; }
            100% { opacity: 0; }
        }
        .office .status-text {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255,100,100,0.3);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(255,0,0,0.1);
        }
        .office .animatronic-display {
            position: absolute;
            top: 10%;
            font-size: 100px;
            opacity: 0.4;
            pointer-events: none;
            text-shadow: 0 0 80px rgba(255,0,0,0.2);
            animation: pulse 2s infinite;
            transition: all 0.5s;
        }
        .office .animatronic-display.danger {
            opacity: 0.9;
            text-shadow: 0 0 100px rgba(255,0,0,0.5);
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        /* ===== КАМЕРЫ ===== */
        .cameras {
            flex: 1.2;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            border: 1px solid rgba(255,50,50,0.05);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 180px;
        }
        .cameras .cam-title {
            font-size: 12px;
            color: #aa5555;
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,50,50,0.05);
            padding-bottom: 8px;
            margin-bottom: 6px;
        }
        .camera-btn {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,50,50,0.05);
            border-radius: 12px;
            padding: 10px 12px;
            color: #886666;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .camera-btn:hover {
            background: rgba(255,50,50,0.05);
            border-color: rgba(255,50,50,0.15);
        }
        .camera-btn .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #44aa44;
            box-shadow: 0 0 20px #44aa44;
            transition: 0.3s;
        }
        .camera-btn .dot.danger {
            background: #ff4444;
            box-shadow: 0 0 30px #ff4444;
            animation: blink 0.6s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        .camera-btn .cam-name {
            font-weight: 500;
        }
        .camera-btn .cam-status {
            font-size: 10px;
            color: #665555;
        }
        /* ===== ДВЕРИ ===== */
        .doors {
            display: flex;
            gap: 16px;
            justify-content: center;
            padding: 10px 0;
        }
        .door-btn {
            padding: 14px 36px;
            border-radius: 40px;
            border: 2px solid rgba(255,50,50,0.05);
            background: rgba(0,0,0,0.4);
            color: #886666;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Press Start 2P', monospace;
            flex: 1;
            max-width: 200px;
        }
        .door-btn:hover {
            background: rgba(255,50,50,0.05);
            border-color: rgba(255,50,50,0.15);
        }
        .door-btn.active {
            background: rgba(255,50,50,0.15);
            border-color: #ff4444;
            color: #ff4444;
            box-shadow: 0 0 40px rgba(255,0,0,0.1);
        }
        .door-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        /* ===== ПОПАПЫ ===== */
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 10;
        }
        .game-over.show {
            display: flex;
        }
        .game-over h1 {
            font-size: 48px;
            color: #ff2222;
            text-shadow: 0 0 80px rgba(255,0,0,0.3);
            margin-bottom: 8px;
        }
        .game-over h1.win {
            color: #44dd44;
            text-shadow: 0 0 80px rgba(0,255,0,0.2);
        }
        .game-over p {
            font-size: 18px;
            color: #886666;
            margin-bottom: 24px;
        }
        .game-over button {
            padding: 16px 56px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Press Start 2P', monospace;
            box-shadow: 0 8px 30px rgba(124,58,237,0.2);
        }
        .game-over button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 40px rgba(124,58,237,0.4);
        }
        .night-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            padding: 40px 60px;
            border-radius: 20px;
            border: 2px solid rgba(255,50,50,0.05);
            text-align: center;
            z-index: 5;
            display: none;
        }
        .night-popup.show {
            display: block;
            animation: popIn 0.5s ease;
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .night-popup h2 {
            font-size: 32px;
            color: #ff5555;
            margin-bottom: 4px;
        }
        .night-popup p {
            color: #886666;
            font-size: 14px;
        }
        @media (max-width: 750px) {
            .game-container { padding: 10px; max-height: 100vh; border-radius: 0; }
            .main-area { flex-direction: column; }
            .cameras { flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .cameras .cam-title { width: 100%; }
            .camera-btn { flex: 1; min-width: 70px; padding: 8px 8px; font-size: 10px; }
            .door-btn { max-width: 120px; font-size: 11px; padding: 10px 12px; }
            .game-over h1 { font-size: 28px; }
            .night-popup { padding: 20px 24px; }
            .night-popup h2 { font-size: 22px; }
            .office .animatronic-display { font-size: 60px; }
        }
    </style>
</head>
<body>

    <div class="game-container" id="app">
        <!-- ШАПКА -->
        <div class="header">
            <div class="night">🌙 Ночь <span id="nightNum">1</span></div>
            <div class="time">⏰ <span id="timeDisplay">12:00 AM</span></div>
            <div class="power">⚡ <span id="powerNum">100</span>%</div>
        </div>

        <!-- ОСНОВНАЯ ОБЛАСТЬ -->
        <div class="main-area">
            <div class="office" id="office">
                <div class="desk"></div>
                <div class="screen-flicker"></div>
                <div class="status-text" id="statusText">🔴 ВСЁ СПОКОЙНО</div>
                <div class="animatronic-display" id="animatronicDisplay"></div>
            </div>
            <div class="cameras">
                <div class="cam-title">📹 КАМЕРЫ</div>
                <button class="camera-btn" data-cam="cam1">
                    <span class="cam-name">📹 Зал</span>
                    <span class="cam-status" id="cam1Status">Пусто</span>
                    <span class="dot" id="cam1Dot"></span>
                </button>
                <button class="camera-btn" data-cam="cam2">
                    <span class="cam-name">📹 Коридор</span>
                    <span class="cam-status" id="cam2Status">Пусто</span>
                    <span class="dot" id="cam2Dot"></span>
                </button>
                <button class="camera-btn" data-cam="cam3">
                    <span class="cam-name">📹 Склад</span>
                    <span class="cam-status" id="cam3Status">Пусто</span>
                    <span class="dot" id="cam3Dot"></span>
                </button>
                <button class="camera-btn" data-cam="cam4">
                    <span class="cam-name">📹 Кухня</span>
                    <span class="cam-status" id="cam4Status">Пусто</span>
                    <span class="dot" id="cam4Dot"></span>
                </button>
            </div>
        </div>

        <!-- ДВЕРИ -->
        <div class="doors">
            <button class="door-btn" id="leftDoor">🚪 Левая дверь</button>
            <button class="door-btn" id="rightDoor">🚪 Правая дверь</button>
        </div>

        <!-- ПОПАПЫ -->
        <div class="night-popup" id="nightPopup">
            <h2>🌙 Ночь <span id="popupNight">1</span></h2>
            <p>Продержитесь до 6:00 AM</p>
        </div>
        <div class="game-over" id="gameOver">
            <h1 id="resultTitle">💀 ВАС НАШЛИ</h1>
            <p id="resultDesc">Вы продержались 0 ночей</p>
            <button id="restartBtn">🔄 Начать заново</button>
        </div>
    </div>

    <script>
        // ============================================================
        // FNAF — ОРИГИНАЛЬНАЯ МЕХАНИКА
        // ============================================================
        const state = {
            night: 1,
            power: 100,
            maxPower: 100,
            leftDoor: false,
            rightDoor: false,
            time: 0, // 0 = 12:00 AM, 120 = 6:00 AM
            animatronics: {
                freddy: { name: 'Фредди', pos: 'cam1', emoji: '🐻', speed: 0.2, danger: false, moveTimer: 0 },
                bonnie: { name: 'Бонни', pos: 'cam2', emoji: '🐰', speed: 0.3, danger: false, moveTimer: 0 },
                chica: { name: 'Чика', pos: 'cam3', emoji: '🐤', speed: 0.25, danger: false, moveTimer: 0 },
                foxy: { name: 'Фокси', pos: 'cam4', emoji: '🦊', speed: 0.35, danger: false, moveTimer: 0 }
            },
            gameOver: false,
            win: false,
            interval: null,
            powerInterval: null,
            moveInterval: null,
            timeInterval: null,
            isNightPopup: false
        };

        // DOM
        const nightNum = document.getElementById('nightNum');
        const powerNum = document.getElementById('powerNum');
        const timeDisplay = document.getElementById('timeDisplay');
        const statusText = document.getElementById('statusText');
        const leftDoorBtn = document.getElementById('leftDoor');
        const rightDoorBtn = document.getElementById('rightDoor');
        const gameOverEl = document.getElementById('gameOver');
        const resultTitle = document.getElementById('resultTitle');
        const resultDesc = document.getElementById('resultDesc');
        const restartBtn = document.getElementById('restartBtn');
        const animatronicDisplay = document.getElementById('animatronicDisplay');
        const nightPopup = document.getElementById('nightPopup');
        const popupNight = document.getElementById('popupNight');

        // Обновление камер
        function updateCameras() {
            const anims = state.animatronics;
            const camStatus = { cam1: [], cam2: [], cam3: [], cam4: [] };
            for (let key in anims) {
                const a = anims[key];
                if (a.pos) camStatus[a.pos].push(a.name);
            }
            ['cam1', 'cam2', 'cam3', 'cam4'].forEach((cam, idx) => {
                const statusEl = document.getElementById(cam + 'Status');
                const dotEl = document.getElementById(cam + 'Dot');
                const names = camStatus[cam];
                if (names.length > 0) {
                    statusEl.textContent = names.join(', ');
                    dotEl.className = 'dot danger';
                } else {
                    statusEl.textContent = 'Пусто';
                    dotEl.className = 'dot';
                }
            });
        }

        // Проверка безопасности
        function checkSafety() {
            const anims = state.animatronics;
            let danger = false;
            let dangerName = '';
            for (let key in anims) {
                const a = anims[key];
                if (a.pos === 'office') {
                    danger = true;
                    dangerName = a.name;
                    break;
                }
            }
            if (danger) {
                statusText.textContent = `⚠️ ${dangerName} В ОФИСЕ!`;
                const doorClosed = state.leftDoor || state.rightDoor;
                if (!doorClosed) {
                    gameOver('💀 ВАС НАШЛИ', `${dangerName} пробрался в офис`);
                    return false;
                } else {
                    const anim = Object.values(anims).find(a => a.pos === 'office');
                    if (anim) {
                        anim.pos = 'cam1';
                        statusText.textContent = '🚪 Дверь спасла!';
                        updateCameras();
                    }
                }
            } else {
                statusText.textContent = '🔴 ВСЁ СПОКОЙНО';
            }
            return true;
        }

        // Передвижение аниматроников (AI)
        function moveAnimatronics() {
            if (state.gameOver) return;
            const anims = state.animatronics;
            const rooms = ['cam1', 'cam2', 'cam3', 'cam4', 'office'];
            for (let key in anims) {
                const a = anims[key];
                const chance = a.speed * (1 + state.night * 0.08);
                if (Math.random() < chance * 0.12) {
                    let newPos;
                    // Фокси бежит быстрее и чаще
                    if (key === 'foxy' && Math.random() < 0.3) {
                        newPos = 'office';
                    } else {
                        do {
                            newPos = rooms[Math.floor(Math.random() * rooms.length)];
                        } while (newPos === a.pos && Math.random() > 0.3);
                    }
                    a.pos = newPos;
                }
            }
            updateCameras();
            checkSafety();
            // Отображение аниматроника в офисе
            const officeAnim = Object.values(anims).find(a => a.pos === 'office');
            if (officeAnim) {
                animatronicDisplay.textContent = officeAnim.emoji;
                animatronicDisplay.className = 'animatronic-display danger';
            } else {
                animatronicDisplay.textContent = '';
                animatronicDisplay.className = 'animatronic-display';
            }
        }

        // Игра окончена
        function gameOver(title, desc) {
            if (state.gameOver) return;
            state.gameOver = true;
            clearInterval(state.interval);
            clearInterval(state.powerInterval);
            clearInterval(state.moveInterval);
            clearInterval(state.timeInterval);
            resultTitle.textContent = title;
            resultTitle.className = '';
            resultDesc.textContent = desc || `Вы продержались ${state.night} ночей`;
            gameOverEl.classList.add('show');
        }

        // Победа (ночь пройдена)
        function winNight() {
            if (state.gameOver) return;
            state.night++;
            if (state.night > 5) {
                state.gameOver = true;
                clearInterval(state.interval);
                clearInterval(state.powerInterval);
                clearInterval(state.moveInterval);
                clearInterval(state.timeInterval);
                resultTitle.textContent = '🏆 ВЫ ВЫЖИЛИ!';
                resultTitle.className = 'win';
                resultDesc.textContent = 'Вы прошли все 5 ночей! Поздравляем!';
                gameOverEl.classList.add('show');
                return;
            }
            // Попап новой ночи
            popupNight.textContent = state.night;
            nightPopup.classList.add('show');
            setTimeout(() => {
                nightPopup.classList.remove('show');
            }, 2000);

            nightNum.textContent = state.night;
            state.time = 0;
            state.power = state.maxPower;
            powerNum.textContent = state.power;
            timeDisplay.textContent = '12:00 AM';
            statusText.textContent = `🌙 Ночь ${state.night} началась`;
            // Сброс позиций аниматроников
            const rooms = ['cam1', 'cam2', 'cam3', 'cam4'];
            for (let key in state.animatronics) {
                state.animatronics[key].pos = rooms[Math.floor(Math.random() * rooms.length)];
            }
            updateCameras();
            animatronicDisplay.textContent = '';
            animatronicDisplay.className = 'animatronic-display';
        }

        // Энергия
        function consumePower() {
            if (state.gameOver) return;
            let drain = 1;
            if (state.leftDoor) drain += 2;
            if (state.rightDoor) drain += 2;
            state.power = Math.max(0, state.power - drain * 0.25);
            powerNum.textContent = Math.floor(state.power);
            if (state.power <= 0) {
                gameOver('⚡ НЕТ ЭНЕРГИИ', 'Вы не смогли продержаться до утра');
            }
        }

        // Время
        function updateTime() {
            if (state.gameOver) return;
            state.time++;
            const hours = Math.floor(state.time / 60) + 12;
            const minutes = (state.time % 60) * 5;
            const ampm = hours < 12 ? 'AM' : 'PM';
            const h = hours > 12 ? hours - 12 : hours;
            timeDisplay.textContent = `${h}:${minutes.toString().padStart(2, '0')} ${ampm}`;
            if (state.time >= 120) {
                winNight();
            }
        }

        // Перезапуск
        function restartGame() {
            state.night = 1;
            state.power = state.maxPower;
            state.leftDoor = false;
            state.rightDoor = false;
            state.time = 0;
            state.gameOver = false;
            gameOverEl.classList.remove('show');
            resultTitle.className = '';
            nightNum.textContent = '1';
            powerNum.textContent = '100';
            timeDisplay.textContent = '12:00 AM';
            statusText.textContent = '🔴 ВСЁ СПОКОЙНО';
            leftDoorBtn.classList.remove('active');
            rightDoorBtn.classList.remove('active');
            const rooms = ['cam1', 'cam2', 'cam3', 'cam4'];
            for (let key in state.animatronics) {
                state.animatronics[key].pos = rooms[Math.floor(Math.random() * rooms.length)];
            }
            updateCameras();
            animatronicDisplay.textContent = '';
            animatronicDisplay.className = 'animatronic-display';
            clearInterval(state.interval);
            clearInterval(state.powerInterval);
            clearInterval(state.moveInterval);
            clearInterval(state.timeInterval);
            startGame();
        }

        // Старт игры
        function startGame() {
            state.interval = setInterval(() => {}, 1000);
            state.timeInterval = setInterval(updateTime, 1000);
            state.powerInterval = setInterval(consumePower, 1500);
            state.moveInterval = setInterval(moveAnimatronics, 2500);
            updateCameras();
        }

        // Управление дверями
        leftDoorBtn.addEventListener('click', function() {
            if (state.gameOver) return;
            state.leftDoor = !state.leftDoor;
            this.classList.toggle('active');
            statusText.textContent = state.leftDoor ? '🚪 Левая дверь закрыта' : '🔴 ВСЁ СПОКОЙНО';
        });
        rightDoorBtn.addEventListener('click', function() {
            if (state.gameOver) return;
            state.rightDoor = !state.rightDoor;
            this.classList.toggle('active');
            statusText.textContent = state.rightDoor ? '🚪 Правая дверь закрыта' : '🔴 ВСЁ СПОКОЙНО';
        });

        // Перезапуск
        restartBtn.addEventListener('click', restartGame);

        // СТАРТ
        startGame();
    </script>
</body>
</html>
